<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Risu</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Jost:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* ==========================================
           --- 视觉重构：极致白皙的明亮奶油质感 ---
           ========================================== */
        :root {
            --bg-paper: #FFFFFF;
            --text-dark: #5C415D;
            --text-light: #FFFFFF;
            --brass: #E0A96D;
            --brass-dark: #D9727F;
            --accent-purple: #A890CE;
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: 'Playfair Display', 'Georgia', serif;
            background: linear-gradient(135deg, #FFFFFF 0%, #FFF5F5 100%);
            touch-action: none; position: relative;
            cursor: default; width: 100vw; height: 100vh;
        }

        /* --- 音乐律动可视化画布 --- */
        #audio-visualizer {
            position: fixed; bottom: 0; left: 0; width: 100vw; height: 30vh;
            z-index: 5; pointer-events: none; opacity: 0; transition: opacity 1s ease;
        }
        #audio-visualizer.active { opacity: 1; }

        #webgl-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 6; cursor: grab; pointer-events: auto; }
        #webgl-container:active { cursor: grabbing; }

        .curtain {
            position: fixed; top: 0; width: 50vw; height: 100vh; z-index: 9998;
            background: repeating-linear-gradient(to right, transparent, rgba(92, 65, 93, 0.02) 4%, transparent 8%), linear-gradient(135deg, #FFFFFF 0%, #FFF5F5 100%);
            transition: transform 2.8s cubic-bezier(0.65, 0, 0.15, 1); box-shadow: inset 0 0 30px rgba(217, 114, 127, 0.03);
        }
        #curtain-left { left: 0; transform-origin: left; box-shadow: inset -15px 0 25px rgba(0,0,0,0.03); }
        #curtain-right { right: 0; transform-origin: right; box-shadow: inset 15px 0 25px rgba(0,0,0,0.03); }
        #curtain-left.open { transform: translateX(-100%); }
        #curtain-right.open { transform: translateX(100%); }

        #loading-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: transparent; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1.5s ease-in-out; }
        .loading-icon { width: 45px; height: 45px; fill: #D9727F; animation: pulse 1.5s infinite ease-in-out; margin-bottom: 25px; filter: drop-shadow(0 4px 10px rgba(217, 114, 127, 0.2)); }
        .loading-text { font-family: 'Jost', sans-serif; font-size: 14px; letter-spacing: 6px; color: #5C415D; text-transform: uppercase; }
        @keyframes pulse { 0%, 100% { transform: scale(1) translateY(0); } 50% { transform: scale(1.05) translateY(-5px); } }

        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyBAMAAADsEZWCAAAAGFBMVEUAAAAAAABhw8h/AAAAAXRSTlMAQObVGgAAAHJJREFUOI2t08ENwCAMQ9E0yv6LxhBQRJ2g+r/E0n/Y42g1Z5zP+r1W18zM0r1Xv4HMWvWczVn11D0yZzVn1VOvH0hmreauejrmnNVZ9dTvXzJndVY9dXvOrOaseur2nFnNWfXU/wEyZ9VTv3vKnNWcVU+9fqB/9Q2f8g84g1tW1AAAAABJRU5ErkJggg=='); opacity: 0.02; pointer-events: none; z-index: 2; }

        #intro-ui { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; transition: opacity 1.5s ease; }
        .intro-hint { position: absolute; top: 15%; color: rgba(92, 65, 93, 0.7); font-family: 'Jost', sans-serif; letter-spacing: 4px; font-size: 14px; text-transform: uppercase; animation: pulseHint 2.5s infinite; }

        #enter-btn {
            position: absolute; bottom: 15%; padding: 14px 38px; border-radius: 50px;
            background: rgba(255, 255, 255, 0.85);
            border: none;
            box-shadow: 0 8px 25px rgba(217, 114, 127, 0.15);
            color: #D9727F;
            font-family: 'Jost', sans-serif; font-weight: bold; letter-spacing: 3px; font-size: 15px;
            cursor: pointer; pointer-events: auto; transition: all 0.4s ease; backdrop-filter: blur(8px);
            opacity: 0; visibility: hidden; transform: translateY(20px);
        }
        #enter-btn.show { opacity: 1; visibility: visible; transform: translateY(0); }
        #enter-btn:hover {
            background: #D9727F; color: #FFF;
            box-shadow: 0 12px 30px rgba(217, 114, 127, 0.3);
            transform: translateY(-5px);
        }

        #main-gallery-ui { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; opacity: 0; visibility: hidden; transition: opacity 1.5s ease; }
        #main-gallery-ui.show { opacity: 1; visibility: visible; }

        /* --- 音量提示小字 --- */
        .volume-hint {
            position: fixed;
            bottom: 95px;
            right: 40px;
            width: 140px; /* 大致与按钮同宽以实现居中对齐 */
            z-index: 150;
            color: rgba(217, 114, 127, 0.85);
            font-family: 'Jost', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        #main-gallery-ui.show .volume-hint {
            opacity: 1;
            animation: bounceArrow 2s infinite ease-in-out;
        }
        #main-gallery-ui.show .volume-hint.hide {
            opacity: 0;
            visibility: hidden;
            animation: none;
        }
        @keyframes bounceArrow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(5px); }
        }

        /* --- 独立音乐控制按钮 --- */
        #music-toggle-btn { position: fixed; bottom: 40px; right: 40px; z-index: 150; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: none; border-radius: 50px; padding: 12px 24px; color: #D9727F; font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; pointer-events: auto; display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 25px rgba(217, 114, 127, 0.15); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); opacity: 0; transform: translateY(20px); }
        #main-gallery-ui.show #music-toggle-btn { opacity: 1; transform: translateY(0); }
        #music-toggle-btn:hover { background: #FFF5F5; transform: translateY(-3px); box-shadow: 0 12px 30px rgba(217, 114, 127, 0.25); }
        #music-toggle-btn.playing { background: #D9727F; color: #FFFFFF; }
        .music-icon { font-size: 16px; display: inline-block; transition: transform 0.3s ease; }
        #music-toggle-btn.playing .music-icon { animation: musicSpin 3s linear infinite; }
        @keyframes musicSpin { 100% { transform: rotate(360deg); } }

        .transition-wrapper { position: absolute; width: 100%; height: 100%; pointer-events: none; transition: opacity 0.8s ease, transform 0.8s ease; }
        .hidden-wrapper { opacity: 0 !important; transform: scale(0.95); visibility: hidden !important; pointer-events: none !important; filter: blur(5px); }

        .back-btn { position: fixed; top: 35px; left: 35px; display: flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); padding: 10px 22px; border-radius: 50px; color: #D9727F; font-size: 14px; font-weight: bold; cursor: pointer; z-index: 50; border: none; box-shadow: 0 8px 20px rgba(217, 114, 127, 0.15); opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none; }
        .back-btn.show { opacity: 1; visibility: visible; transform: translateY(0); pointer-events: auto; }
        .back-btn:hover { background: #D9727F; color: #FFFFFF; transform: translateY(-3px); box-shadow: 0 12px 25px rgba(217, 114, 127, 0.3); }

        /* ==========================================
           --- 全新分行时钟挂件样式 ---
           ========================================== */
        .time-widget {
            position: absolute; top: 35px; right: 40px;
            border-bottom: 2px solid #E0A96D; padding-bottom: 15px;
            text-align: right; z-index: 15; pointer-events: auto;
        }
        .time-line { font-family: 'Jost', sans-serif; font-size: 15px; color: rgba(92, 65, 93, 0.7); letter-spacing: 2px; margin-bottom: 8px; font-weight: 600; }
        .time-date { font-family: 'Playfair Display', serif; font-size: 20px; color: #E0A96D; font-weight: 700; font-style: italic; }
        .time-highlight { font-family: 'Jost', sans-serif; font-size: 22px; color: #D9727F; font-weight: 600; letter-spacing: 3px; margin-bottom: 15px; }
        .time-caption { display: block; margin-bottom: 5px; color: rgba(92, 65, 93, 0.5); font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 2px; }
        .time-display { font-size: 38px; font-weight: 700; font-family: 'Jost', sans-serif; letter-spacing: 4px; color: #5C415D; opacity: 0.85; line-height: 1; }
        .time-blink { animation: blink 1.5s infinite ease-in-out; color: #D9727F; }

        .hero-title { position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; pointer-events: auto; }

        h1 {
            font-size: 85px;
            margin: 0; letter-spacing: 6px; font-weight: 700; line-height: 1.2;
            background: linear-gradient(45deg, #A890CE, #D9727F, #E0A96D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            text-shadow: 0px 8px 24px rgba(217, 114, 127, 0.25);
        }
        h1 span {
            display: block;
            font-size: 45px;
            font-style: italic; font-weight: 500; margin-top: 10px;
            background: linear-gradient(45deg, #D9727F, #E0A96D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .btn-group { position: absolute; top: 62%; left: 50%; transform: translateX(-50%); display: flex; flex-direction: row; gap: 25px; pointer-events: auto; }

        .action-btn {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            box-shadow: 0 8px 25px rgba(217, 114, 127, 0.15);
            padding: 14px 34px; border-radius: 50px;
            color: #D9727F;
            font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.4s ease;
            letter-spacing: 3px; backdrop-filter: blur(5px); font-family: 'Playfair Display', serif;
        }
        .action-btn:hover {
            background: #D9727F; color: #FFFFFF;
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(217, 114, 127, 0.3);
        }

        /* ==========================================
           --- 小猫与动态歌词卡点装饰 ---
           ========================================== */
        .cute-cat { position: absolute; left: 50%; bottom: -15px; transform: translateX(-50%); width: 85px; height: 85px; z-index: 20; filter: drop-shadow(0px -4px 8px rgba(92, 65, 93, 0.25)); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: auto; cursor: pointer; }
        .cute-cat:hover { transform: translate(-50%, -25px) rotate(3deg); }
        .cat-body { fill: #2A212A; }

        /* 猫咪绿色眼睛 */
        .cat-eye { position: absolute; top: 38px; left: 26px; width: 5px; height: 5px; background: #2ed573; border-radius: 50%; box-shadow: 0 0 8px #2ed573; z-index: 2; transform-origin: center; animation: wink 4s infinite; }
        .cat-eye.right { left: auto; right: 26px; }
        @keyframes wink { 0%, 96%, 100% { transform: scaleY(1); } 98% { transform: scaleY(0.1); } }

        @keyframes catJumpAnim { 0%, 100% { bottom: -15px; } 50% { bottom: 20px; } }
        .cute-cat.is-jumping { animation: catJumpAnim 0.6s ease-in-out infinite; }

        .cat-dec { opacity: 0; z-index: 3; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .cat-gift { position: absolute; right: -40px; bottom: -5px; width: 45px; height: 50px; transform: scale(0) translateY(10px); }
        .cute-cat.show-gift .cat-gift { animation: dropAndSettle 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        .cat-hat { position: absolute; top: -5px; left: 50%; width: 45px; height: 45px; transform: translateX(-50%) translateY(-40px) scale(0) rotate(15deg); }
        .cat-bowtie { position: absolute; top: 60px; left: 50%; width: 35px; height: 20px; transform: translateX(-50%) scale(0); transition-delay: 0.2s; }
        .cute-cat.dress-code .cat-hat { transform: translateX(-50%) translateY(0) scale(1) rotate(-5deg); opacity: 1; }
        .cute-cat.dress-code .cat-bowtie { transform: translateX(-50%) scale(1); opacity: 1; }

        .cat-cake-dec { position: absolute; left: -50px; bottom: -5px; width: 50px; height: 55px; transform: scale(0) translateY(20px); }
        .cute-cat.show-cake .cat-cake-dec { animation: dropAndSettle 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        @keyframes dropAndSettle {
            0% { transform: scale(0) translateY(-30px); opacity: 0; }
            50% { transform: scale(1.3) translateY(-10px); opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* ==========================================
           --- 装饰与点缀 ---
           ========================================== */
        #secret-letter-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100; background: rgba(255, 245, 245, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none; }
        #secret-letter-overlay.show { opacity: 1; visibility: visible; pointer-events: auto; }
        .letter-paper { background: rgba(255, 255, 255, 0.95); border: 1px solid #FFFFFF; border-radius: 20px; padding: 50px; width: 80vw; max-width: 500px; max-height: 80vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(92, 65, 93, 0.15); position: relative; transform: translateY(50px) scale(0.9); transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: auto; }
        #secret-letter-overlay.show .letter-paper { transform: translateY(0) scale(1); }
        .close-letter-btn { position: absolute; top: 20px; right: 25px; font-size: 24px; color: #D9727F; cursor: pointer; transition: transform 0.3s; font-family: sans-serif; pointer-events: auto; }
        .close-letter-btn:hover { transform: rotate(90deg); color: #5C415D; }
        .letter-content h2 { font-family: 'Playfair Display', serif; color: #D9727F; margin-top: 0; margin-bottom: 25px; letter-spacing: 2px;}
        .letter-content p { font-family: 'Georgia', serif; font-size: 16px; color: #5C415D; line-height: 1.8; letter-spacing: 1px; margin-bottom: 10px;}
        .letter-link { display: inline-block; margin: 10px 0; padding: 10px 24px; background: rgba(217, 114, 127, 0.1); color: #D9727F; cursor: pointer; text-decoration: none; border-radius: 12px; font-weight: bold; font-family: 'Jost', sans-serif; letter-spacing: 1px; border: 1px solid rgba(217, 114, 127, 0.3); transition: all 0.3s ease; }
        .letter-link:hover { background: #D9727F; color: #FFFFFF; transform: translateY(-2px); box-shadow: 0 8px 15px rgba(217, 114, 127, 0.3); }

        .cute-deco { position: absolute; z-index: 25; opacity: 0.8; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1)); pointer-events: auto; cursor: pointer; transition: filter 0.3s ease; }
        .cute-deco:hover { filter: drop-shadow(0 0 12px rgba(217, 114, 127, 0.7)) brightness(1.1); }

        /* 礼花筒 */
        .deco-popper { top: 15%; right: 12%; width: 45px; fill: #E0A96D; }

        .deco-plane { top: 20%; left: 15%; width: 50px; fill: #A890CE; opacity: 0.6;}
        .deco-star { top: 60%; right: 18%; width: 25px; fill: #D9727F; }
        .deco-moon { bottom: 25%; left: 10%; width: 35px; fill: #E0A96D; opacity: 0.5;}

        .float-wrap { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
        .float-wrap > svg { animation: floatSlow 6s ease-in-out infinite; }
        .float-wrap.reverse > svg { animation: floatSlow 8s ease-in-out infinite reverse; }
        .float-wrap.delay > svg { animation: floatSlow 7s ease-in-out infinite 1s; }
        @keyframes floatSlow { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-15px) rotate(5deg); } }

        /* 礼花筒动画 */
        @keyframes popperPop { 0% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.3) rotate(-15deg); filter: brightness(1.2); } 100% { transform: scale(1) rotate(0deg); } }
        .anim-popper { animation: popperPop 0.6s ease-out forwards !important; }

        @keyframes planeFly { 0% { transform: translate(0, 0) scale(1) rotate(-5deg); opacity: 0.6; } 40% { transform: translate(80vw, -60vh) scale(0.8) rotate(20deg); opacity: 0; } 41% { transform: translate(-50vw, 40vh) scale(0.5) rotate(-20deg); opacity: 0; } 100% { transform: translate(0, 0) scale(1) rotate(-5deg); opacity: 0.6; } }
        .anim-plane { animation: planeFly 1.5s cubic-bezier(0.5, 0, 0.2, 1) forwards !important; }
        @keyframes starTwinkle { 0% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.6) rotate(180deg); filter: drop-shadow(0 0 15px #D9727F) brightness(1.5); } 100% { transform: scale(1) rotate(360deg); } }
        .anim-star { animation: starTwinkle 0.8s ease-in-out forwards !important; }
        @keyframes moonRock { 0% { transform: rotate(0deg) scale(1); } 25% { transform: rotate(-35deg) scale(1.1); } 50% { transform: rotate(15deg) scale(1.1); } 75% { transform: rotate(-10deg) scale(1.1); } 100% { transform: rotate(0deg) scale(1); } }
        .anim-moon { animation: moonRock 0.8s ease-in-out forwards !important; }

        #swipeHint { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); color: #D9727F; font-family: 'Playfair Display', serif; font-size: 14px; pointer-events: none; z-index: 5; letter-spacing: 4px; opacity: 0; visibility: hidden; transition: opacity 0.5s ease, visibility 0.5s ease; }
        #swipeHint.show-hint { opacity: 0.8; visibility: visible; animation: pulseHint 2s infinite; }
        @keyframes pulseHint { 0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.5; } 50% { transform: translateX(-50%) scale(1.05); opacity: 0.9; } }

        /* --- 极客终端样式 --- */
        #terminal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10, 10, 10, 0.96); backdrop-filter: blur(10px); z-index: 100000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: opacity 0.4s ease; pointer-events: none; }
        #terminal-overlay.show { opacity: 1; visibility: visible; pointer-events: auto; }
        #terminal-content { width: 90vw; max-width: 800px; height: 80vh; overflow-y: auto; font-family: 'Courier New', Courier, monospace; color: #00FF41; font-size: 15px; line-height: 1.8; text-shadow: 0 0 5px rgba(0, 255, 65, 0.5); padding: 20px; box-sizing: border-box; border: 1px solid rgba(0, 255, 65, 0.3); border-radius: 8px; background: rgba(0, 0, 0, 0.5); white-space: pre-wrap; }
        #terminal-content::-webkit-scrollbar { width: 8px; } #terminal-content::-webkit-scrollbar-track { background: rgba(0, 255, 65, 0.05); border-radius: 4px; } #terminal-content::-webkit-scrollbar-thumb { background: rgba(0, 255, 65, 0.3); border-radius: 4px; } #terminal-content::-webkit-scrollbar-thumb:hover { background: rgba(0, 255, 65, 0.6); }

        .term-cursor { display: inline-block; width: 10px; height: 18px; background-color: #00FF41; animation: blinkTerm 1s step-end infinite; vertical-align: bottom; margin-left: 2px; }
        .term-hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(0, 255, 65, 0.5); font-family: 'Courier New', Courier, monospace; font-size: 12px; pointer-events: none; letter-spacing: 1px; }
        @keyframes blinkTerm { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* ASCII 动画容器专用样式 */
        .ascii-container { text-align: center; margin-top: 20px; width: 100%; display: flex; justify-content: center;}
        .ascii-art { font-family: 'Courier New', monospace; line-height: 1.15; display: inline-block; text-align: left; color: #00FF41; text-shadow: 0 0 8px rgba(0,255,65,0.4); white-space: pre;}

        @media (max-width: 600px) {
            h1 { font-size: 50px; } h1 span { font-size: 30px; } .hero-title { top: 35%; }
            .btn-group { top: 58%; flex-direction: column; width: 70%; gap: 15px;}

            /* 移动端时钟挂件微调 */
            .time-widget { top: 25px; right: 25px; padding-bottom: 10px; }
            .time-line { font-size: 13px; letter-spacing: 1px; margin-bottom: 5px; }
            .time-date { font-size: 17px; }
            .time-highlight { font-size: 18px; letter-spacing: 2px; margin-bottom: 10px; }
            .time-caption { font-size: 11px; letter-spacing: 1px; margin-bottom: 3px; }
            .time-display { font-size: 30px; }

            .cute-cat { width: 75px; height: 75px; bottom: -10px; } .cat-eye { top: 34px; left: 22px; width: 4.5px; height: 4.5px; } .cat-eye.right { right: 22px; }
            .cute-deco { opacity: 0.5; } #swipeHint { bottom: 200px; } .letter-paper { padding: 30px; }
            .letter-link { padding: 8px 16px; font-size: 13px; }
            .back-btn { top: 20px; left: 20px; padding: 8px 18px; font-size: 13px; }
            .intro-hint { top: 25%; font-size: 12px; }
            #terminal-content { font-size: 12px; }
            #music-toggle-btn { bottom: 20px; right: 20px; padding: 10px 18px; font-size: 12px; }
            .volume-hint { bottom: 65px; right: 20px; width: 110px; font-size: 10px; letter-spacing: 1px; }
            .ascii-art { font-size: 10px; line-height: 1.1;}
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <svg class="loading-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22 6C22 4.9 21.1 4 20 4H4C2.9 4 2 4.9 2 6V18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6ZM20 6L12 11L4 6H20ZM20 18H4V8L12 13L20 8V18Z"/></svg>
        <div class="loading-text">Preparing Surprise For Risu...</div>
    </div>

    <div id="curtain-left" class="curtain"></div>
    <div id="curtain-right" class="curtain"></div>

    <canvas id="audio-visualizer"></canvas>

    <div id="webgl-container"></div>

    <audio id="main-bg-music" src="./static/緑黄色社会 - Party!!.mp3"></audio>

    <div id="intro-ui">
        <div class="intro-hint">拖拽旋转</div>
        <button id="enter-btn">点</button>
    </div>

    <div id="main-gallery-ui" class="main-ui-layer">

        <div id="volume-hint" class="volume-hint">注意音量<br>↓</div>

        <button id="music-toggle-btn">
            <span class="music-icon">🎵</span>
            <span class="music-text">Play Party!!</span>
        </button>

        <div id="backBtn" class="back-btn">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            返回主页
        </div>

        <div class="float-wrap"><svg class="cute-deco deco-popper" viewBox="0 0 24 24"><path d="M14.6 7.4L12 4.8 13.4 3.4 16 6 14.6 7.4ZM18.2 11L19.6 9.6 17 7 15.6 8.4 18.2 11ZM9.4 12.6L6.8 10 5.4 11.4 8 14 9.4 12.6ZM22 3.4L20.6 2 17 5.6 18.4 7 22 3.4ZM2.8 22.8L11.2 14.4 9.6 12.8 1.2 21.2C.8 21.6.8 22.2 1.2 22.6 1.6 23 2.2 23 2.8 22.8ZM16 14C16 14 19 12 21 12C21 14 19 17 19 17L16 14Z" /></svg></div>
        <div class="float-wrap reverse"><svg class="cute-deco deco-plane" viewBox="0 0 24 24"><path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z"/></svg></div>
        <div class="float-wrap delay"><svg class="cute-deco deco-star" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21L16.54 13.97L22 9.24L14.81 8.63L12 2L9.19 8.63L2 9.24L7.46 13.97L5.82 21L12 17.27Z"/></svg></div>
        <div class="float-wrap"><svg class="cute-deco deco-moon" viewBox="0 0 24 24"><path d="M12 2a9.93 9.93 0 0 0-3.97.83 7.82 7.82 0 0 1 0 16.34A9.93 9.93 0 0 0 12 22a10 10 0 0 0 0-20z"/></svg></div>

        <div id="swipeHint"> 左右滑动 </div>

        <div class="transition-wrapper" id="cardWrapper">
            <div class="time-widget" id="timeWidget">
                <div class="time-line">今天是 <span class="time-date">4月25日</span></div>
                <div class="time-line time-highlight">是你的生日！</div>
                <span class="time-caption">现在的时间是：</span>
                <div class="time-display"><span id="hour">00</span><span class="time-blink">:</span><span id="minute">00</span></div>
            </div>
            <div class="hero-title">
                <h1>Happy Birthday<br><span>Dear Risu</span></h1>
            </div>
            <div class="btn-group">
                <button id="scatterBtn" class="action-btn">查看图片</button>
                <button id="uploadBtn" class="action-btn">放入图片</button>
                <input type="file" id="uploadInput" multiple accept="image/*" style="display: none;">
            </div>
        </div>

        <div class="cute-cat" id="cat-trigger">
            <svg viewBox="0 0 100 100" style="position:relative; z-index: 2;">
                <path class="cat-body" d="M50,85 C20,85 10,65 10,45 C10,35 15,20 20,10 L35,28 C40,26 45,25 50,25 C55,25 60,26 65,28 L80,10 C85,20 90,35 90,45 C90,65 80,85 50,85 Z" />
            </svg>
            <div class="cat-eye"></div><div class="cat-eye right"></div>

            <div class="cat-dec cat-gift">
                <svg viewBox="0 0 100 100">
                    <rect x="20" y="40" width="60" height="50" fill="#A890CE" rx="3"/>
                    <rect x="45" y="40" width="10" height="50" fill="#FFD166"/>
                    <rect x="20" y="60" width="60" height="10" fill="#FFD166"/>
                    <path d="M50,40 C35,20 15,30 45,40 Z" fill="#FFD166"/><path d="M50,40 C65,20 85,30 55,40 Z" fill="#FFD166"/>
                </svg>
            </div>

            <div class="cat-dec cat-hat"><svg viewBox="0 0 100 100"><path fill="#5C415D" d="M10,80 L90,80 L90,65 L75,65 L75,20 C75,15 70,10 65,10 L35,10 C30,10 25,15 25,20 L25,65 L10,65 Z"/><rect x="25" y="50" width="50" height="15" fill="#D9727F"/></svg></div>
            <div class="cat-dec cat-bowtie"><svg viewBox="0 0 100 50"><path fill="#D9727F" d="M10,10 L45,25 L10,40 C5,35 5,15 10,10 Z M90,10 L55,25 L90,40 C95,35 95,15 90,10 Z"/><circle cx="50" cy="25" r="10" fill="#E0A96D"/></svg></div>

            <div class="cat-dec cat-cake-dec">
                <svg viewBox="0 0 100 100">
                    <rect x="20" y="55" width="60" height="35" fill="#FFF5F5" rx="5"/>
                    <path d="M20,65 Q35,75 50,65 T80,65 L80,90 L20,90 Z" fill="#D9727F"/>
                    <rect x="45" y="25" width="10" height="30" fill="#FFD166" rx="2"/>
                    <path d="M50,10 Q55,20 50,25 Q45,20 50,10 Z" fill="#FF5722"/>
                </svg>
            </div>
        </div>

        <div id="secret-letter-overlay">
            <div class="letter-paper">
                <div class="close-letter-btn" id="close-letter">✖</div>
                <div class="letter-content">
                    <h2>致 亲爱的 Risu,</h2>
                    <p>生日快乐！<br><br>这是一个只属于你的生日网站<br><br>虽然只有一些展示的功能没什么用<br><br>而且我到最后也没想到应该放什么样的图上去才好<br><br>但是上面你可以自己选择放一些图片进去<br><br>展示界面里边也可以点开看<br><br>右下角是緑黄色社会的《Party!!》<br><br>很适合生日<br><br>另外你可以尝试用键盘输入你的昵称<br></p>
<p><br>—— sw</p>
                </div>
            </div>
        </div>
    </div>

    <div id="terminal-overlay">
        <div id="terminal-content"></div>
        <div class="term-hint">[ 按 ESC 或 双击屏幕 退出 ]</div>
    </div>

    <script>
        // =======================================================
        // 核心时钟
        // =======================================================
        function updateTimeWidget() {
            const now = new Date();
            const hElement = document.getElementById('hour');
            const mElement = document.getElementById('minute');
            if (hElement && mElement) {
                hElement.innerText = String(now.getHours()).padStart(2, '0');
                mElement.innerText = String(now.getMinutes()).padStart(2, '0');
            }
        }

        // =======================================================
        // WebGL 场景配置
        // =======================================================
        const container = document.getElementById('webgl-container');
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0);
        container.appendChild(renderer.domElement);
        let appState = 'INTRO';

        // =======================================================
        // Web Audio API 与音频可视化系统
        // =======================================================
        const bgMusic = document.getElementById('main-bg-music');
        const musicBtn = document.getElementById('music-toggle-btn');
        const musicText = musicBtn.querySelector('.music-text');
        const visualizerCanvas = document.getElementById('audio-visualizer');
        const visCtx = visualizerCanvas.getContext('2d');

        let audioCtx, analyser, dataArray, bufferLength;
        let isAudioInitialized = false;
        let currentBassIntensity = 0;

        function resizeCanvas() { visualizerCanvas.width = window.innerWidth; visualizerCanvas.height = window.innerHeight * 0.3; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        musicBtn.addEventListener('click', () => {
            const volHint = document.getElementById('volume-hint');
            if (bgMusic.paused) {
                if (!isAudioInitialized) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const source = audioCtx.createMediaElementSource(bgMusic);
                    analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
                    source.connect(analyser); analyser.connect(audioCtx.destination);
                    bufferLength = analyser.frequencyBinCount; dataArray = new Uint8Array(bufferLength);
                    isAudioInitialized = true;
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
                bgMusic.play();
                musicBtn.classList.add('playing'); musicText.innerText = 'Playing...';
                visualizerCanvas.classList.add('active');
                if (volHint) volHint.classList.add('hide'); // 点击播放后隐藏提示
            } else {
                bgMusic.pause();
                musicBtn.classList.remove('playing'); musicText.innerText = 'Play Party!!';
                visualizerCanvas.classList.remove('active');
            }
        });

        // =======================================================
        // 🌟 小猫动态歌词卡点逻辑
        // =======================================================
        const catElement = document.querySelector('.cute-cat');

        const LYRICS_TIMING = {
            present: 26.0,
            dress: 35.0,
            jump1: 91.0,
            cake: 122.0,
            jump2: 249.0
        };

        let catFlags = {
            present: false, dress: false,
            jump1: false, cake: false, jump2: false
        };

        bgMusic.addEventListener('timeupdate', () => {
            const t = bgMusic.currentTime;

            if (t >= LYRICS_TIMING.present && !catFlags.present) { catElement.classList.add('show-gift'); catFlags.present = true; }
            if (t >= LYRICS_TIMING.dress && !catFlags.dress) { catElement.classList.add('dress-code'); catFlags.dress = true; }
            if (t >= LYRICS_TIMING.cake && !catFlags.cake) { catElement.classList.add('show-cake'); catFlags.cake = true; }

            if (t >= LYRICS_TIMING.jump1 && t < LYRICS_TIMING.jump1 + 3.0 && !catFlags.jump1) {
                catElement.classList.add('is-jumping'); catFlags.jump1 = true;
                setTimeout(() => { catElement.classList.remove('is-jumping'); }, 2500);
            }
            if (t >= LYRICS_TIMING.jump2 && t < LYRICS_TIMING.jump2 + 3.0 && !catFlags.jump2) {
                catElement.classList.add('is-jumping'); catFlags.jump2 = true;
                setTimeout(() => { catElement.classList.remove('is-jumping'); }, 2500);
            }

            if (t < 5.0) {
                catElement.className = "cute-cat";
                for(let key in catFlags) catFlags[key] = false;
            }
        });

        function drawVisualizer() {
            if (!isAudioInitialized || bgMusic.paused) return;
            analyser.getByteFrequencyData(dataArray);
            visCtx.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);

            const barWidth = (visualizerCanvas.width / bufferLength) * 2.5; let barHeight; let x = 0;
            let bassSum = 0; for(let i = 0; i < 10; i++) bassSum += dataArray[i];
            currentBassIntensity = bassSum / 10 / 255;

            for (let i = 0; i < bufferLength; i++) {
                barHeight = dataArray[i] * 0.8;
                const r = 217 - (i * 1.5); const g = 114 + (i * 1.0); const b = 127 + (i * 0.5);
                visCtx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.25)`;
                visCtx.beginPath();
                visCtx.roundRect(x, visualizerCanvas.height - barHeight, barWidth - 2, barHeight, [5, 5, 0, 0]);
                visCtx.fill(); x += barWidth;
            }
        }

        // =======================================================
        // 场景 A：魔法粒子开场
        // =======================================================
        const introScene = new THREE.Scene();
        const introCamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
        introCamera.position.z = 800;
        const introControls = new THREE.OrbitControls(introCamera, renderer.domElement);
        introControls.enableDamping = true; introControls.dampingFactor = 0.05; introControls.enableZoom = false;

        let textParticles; let isAssembling = false;

        function createParticleText() {
            const canvas = document.createElement('canvas'); canvas.width = 1200; canvas.height = 600;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = 'black'; ctx.fillRect(0, 0, 1200, 600);
            ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = 'italic bold 120px "Playfair Display", serif'; ctx.fillText('Happy Birthday', 600, 220);
            ctx.font = 'italic bold 140px "Playfair Display", serif'; ctx.fillText('to you, Risu', 600, 390);

            const imgData = ctx.getImageData(0, 0, 1200, 600).data;
            const positions = []; const originalPositions = []; const velocities = []; const colors = [];
            const palette = [new THREE.Color(0x5C415D), new THREE.Color(0xD9727F), new THREE.Color(0x7A5B80), new THREE.Color(0xE0A96D)];
            const scale = window.innerWidth < 600 ? 0.45 : 1.0;

            for (let y = 0; y < 600; y += 2) {
                for (let x = 0; x < 1200; x += 2) {
                    if (imgData[(y * 1200 + x) * 4] > 128) {
                        const px = (x - 600) * scale; const py = -(y - 300) * scale; const pz = (Math.random() - 0.5) * 20;
                        const sx = px + (Math.random() - 0.5) * 3500; const sy = py + (Math.random() - 0.5) * 3500; const sz = pz + (Math.random() - 0.5) * 3500;
                        positions.push(sx, sy, sz); originalPositions.push(px, py, pz); velocities.push(0, 0, 0);
                        const c = palette[Math.floor(Math.random() * palette.length)]; colors.push(c.r, c.g, c.b);
                    }
                }
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.setAttribute('originalPosition', new THREE.Float32BufferAttribute(originalPositions, 3));
            geo.setAttribute('velocity', new THREE.Float32BufferAttribute(velocities, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            const mat = new THREE.PointsMaterial({ size: window.innerWidth < 600 ? 1.5 : 1.8, vertexColors: true, transparent: true, opacity: 0.95, sizeAttenuation: true, blending: THREE.NormalBlending });
            textParticles = new THREE.Points(geo, mat); introScene.add(textParticles);
        }
        createParticleText();

        const raycasterIntro = new THREE.Raycaster(); const mouseIntro = new THREE.Vector2(-1000, -1000);
        const planeZ0 = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0); const pointOfIntersection = new THREE.Vector3();
        window.addEventListener('mousemove', (e) => {
            if(appState !== 'INTRO') return;
            mouseIntro.x = (e.clientX / window.innerWidth) * 2 - 1; mouseIntro.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // =======================================================
        // 剧场帷幕与开场
        // =======================================================
        window.addEventListener('DOMContentLoaded', () => {
            setInterval(updateTimeWidget, 1000); updateTimeWidget();
            setTimeout(() => {
                const loader = document.getElementById('loading-screen'); loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    document.getElementById('curtain-left').classList.add('open'); document.getElementById('curtain-right').classList.add('open');
                    setTimeout(() => { isAssembling = true; setTimeout(() => { document.getElementById('enter-btn').classList.add('show'); }, 5000); }, 1200);
                }, 1500);
            }, 800);
        });

        document.getElementById('enter-btn').addEventListener('click', () => {
            const flash = document.createElement('div');
            flash.style.position = 'fixed'; flash.style.top = '0'; flash.style.left = '0';
            flash.style.width = '100vw'; flash.style.height = '100vh'; flash.style.backgroundColor = '#FFFFFF';
            flash.style.zIndex = '9999'; flash.style.opacity = '0'; flash.style.transition = 'opacity 1s ease';
            document.body.appendChild(flash); flash.offsetHeight; flash.style.opacity = '1';

            setTimeout(() => {
                appState = 'MAIN';
                document.getElementById('intro-ui').style.display = 'none';
                document.getElementById('main-gallery-ui').classList.add('show');
                flash.style.opacity = '0';
                setTimeout(() => { flash.remove(); fireMainConfetti(); }, 1000);
            }, 1000);
        });

        // =======================================================
        // 场景 B：主画廊 (Main Scene)
        // =======================================================
        const mainScene = new THREE.Scene();
        mainScene.fog = new THREE.FogExp2(0xFFFFFF, 0.0012);
        const mainCamera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        mainCamera.position.z = 600;
        const galleryGroup = new THREE.Group(); mainScene.add(galleryGroup);

        const starGeometryMain = new THREE.BufferGeometry(); const posArrayMain = new Float32Array(800 * 3);
        for(let i=0; i<2400; i++) posArrayMain[i] = (Math.random() - 0.5) * 2500;
        starGeometryMain.setAttribute('position', new THREE.BufferAttribute(posArrayMain, 3));
        const starMaterialMain = new THREE.PointsMaterial({ size: 3.5, color: 0xD9727F, transparent: true, opacity: 0.7, sizeAttenuation: true });
        mainScene.add(new THREE.Points(starGeometryMain, starMaterialMain));

        const photos = []; const numPhotos = window.innerWidth < 600 ? 25 : 40;
        const closedPositions = []; const carouselPositions = [];
        const plateGeo = new THREE.PlaneGeometry(1, 1); const carouselRadius = Math.max(350, numPhotos * 15);

        for (let i = 0; i < numPhotos; i++) {
            const pastelHues = [0.95, 0.05, 0.7, 0.12]; const randomHue = pastelHues[Math.floor(Math.random() * pastelHues.length)];
            const pMat = new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL(randomHue, 0.6, 0.8), side: THREE.DoubleSide, transparent: true, opacity: 0.65 });
            const mesh = new THREE.Mesh(plateGeo, pMat); mesh.scale.set(60, 60, 1); galleryGroup.add(mesh); photos.push(mesh);
            const phi = Math.acos(-1 + (2 * i) / numPhotos); const theta = Math.sqrt(numPhotos * Math.PI) * phi;
            const r = window.innerWidth < 600 ? 200 : 300;
            closedPositions.push({ x: r * Math.cos(theta) * Math.sin(phi), y: r * Math.sin(theta) * Math.sin(phi), z: r * Math.cos(phi) - 150, rx: Math.random() * Math.PI, ry: Math.random() * Math.PI, rz: Math.random() * Math.PI });
            const angle = (i / numPhotos) * Math.PI * 2;
            carouselPositions.push({ x: Math.cos(angle) * carouselRadius, y: (i % 2 === 0 ? 60 : -60) + Math.sin(angle * 4) * 30, z: Math.sin(angle) * carouselRadius, rx: 0, ry: -angle + Math.PI / 2, rz: 0 });
        }

        let mainState = 'CLOSED'; let activePhoto = null; let originalLocalPos = null; let originalLocalRot = null;

        document.getElementById('backBtn').addEventListener('click', (e) => { e.stopPropagation(); transitionToClosed(); });
        document.getElementById('scatterBtn').addEventListener('click', () => { transitionToCarousel(); });

        function transitionToClosed() {
            mainState = 'CLOSED';
            document.getElementById('cardWrapper').classList.remove('hidden-wrapper');
            document.getElementById('swipeHint').classList.remove('show-hint');
            document.getElementById('backBtn').classList.remove('show');
            photos.forEach((mesh, i) => { new TWEEN.Tween(mesh.position).to({ x: closedPositions[i].x, y: closedPositions[i].y, z: closedPositions[i].z }, 1800).easing(TWEEN.Easing.Exponential.Out).start(); new TWEEN.Tween(mesh.rotation).to({ x: closedPositions[i].rx, y: closedPositions[i].ry, z: closedPositions[i].rz }, 1800).easing(TWEEN.Easing.Exponential.Out).start(); });
        }

        function transitionToCarousel() {
            mainState = 'CAROUSEL';
            document.getElementById('cardWrapper').classList.add('hidden-wrapper');
            document.getElementById('swipeHint').classList.add('show-hint');
            document.getElementById('backBtn').classList.add('show');
            photos.forEach((mesh, i) => { new TWEEN.Tween(mesh.position).to({ x: carouselPositions[i].x, y: carouselPositions[i].y, z: carouselPositions[i].z }, 2500).easing(TWEEN.Easing.Cubic.Out).start(); new TWEEN.Tween(mesh.rotation).to({ x: carouselPositions[i].rx, y: carouselPositions[i].ry, z: carouselPositions[i].rz }, 2500).easing(TWEEN.Easing.Cubic.Out).start(); });
        }

        const raycasterMain = new THREE.Raycaster(); const pointerMain = new THREE.Vector2();
        let isDragging = false; let hasDragged = false; let previousMouseX = 0; let pointerDownPos = { x: 0, y: 0 }; let targetGalleryRotation = 0;

        renderer.domElement.addEventListener('pointerdown', (e) => { if(appState !== 'MAIN') return; isDragging = true; hasDragged = false; previousMouseX = e.clientX; pointerDownPos.x = e.clientX; pointerDownPos.y = e.clientY; });
        renderer.domElement.addEventListener('pointermove', (e) => { if(appState !== 'MAIN' || !isDragging) return; if (Math.hypot(e.clientX - pointerDownPos.x, e.clientY - pointerDownPos.y) > 15) { hasDragged = true; } if (mainState === 'CAROUSEL') { targetGalleryRotation += (e.clientX - previousMouseX) * 0.004; previousMouseX = e.clientX; } });
        renderer.domElement.addEventListener('pointerup', (e) => {
            if(appState !== 'MAIN') return; isDragging = false; if (hasDragged) return;
            if (mainState === 'CLOSED') return;
            if (mainState === 'ZOOMED') { if (activePhoto) { mainState = 'CAROUSEL'; document.getElementById('swipeHint').classList.add('show-hint'); document.getElementById('backBtn').classList.add('show'); galleryGroup.attach(activePhoto); new TWEEN.Tween(activePhoto.position).to({ x: originalLocalPos.x, y: originalLocalPos.y, z: originalLocalPos.z }, 1200).easing(TWEEN.Easing.Cubic.InOut).start(); new TWEEN.Tween(activePhoto.rotation).to({ x: originalLocalRot.x, y: originalLocalRot.y, z: originalLocalRot.z }, 1200).easing(TWEEN.Easing.Cubic.InOut).start(); } return; }
            pointerMain.x = ((e.clientX - renderer.domElement.getBoundingClientRect().left) / window.innerWidth) * 2 - 1; pointerMain.y = -((e.clientY - renderer.domElement.getBoundingClientRect().top) / window.innerHeight) * 2 + 1;
            raycasterMain.setFromCamera(pointerMain, mainCamera); const intersects = raycasterMain.intersectObjects(photos);
            if (intersects.length > 0) { activePhoto = intersects[0].object; originalLocalPos = activePhoto.position.clone(); originalLocalRot = activePhoto.rotation.clone(); mainScene.attach(activePhoto); mainState = 'ZOOMED'; document.getElementById('swipeHint').classList.remove('show-hint'); document.getElementById('backBtn').classList.remove('show'); new TWEEN.Tween(activePhoto.position).to({ x: 0, y: 0, z: mainCamera.position.z - (window.innerWidth < 600 ? 100 : 60) }, 1200).easing(TWEEN.Easing.Cubic.Out).start(); new TWEEN.Tween(activePhoto.rotation).to({ x: 0, y: 0, z: 0 }, 1200).easing(TWEEN.Easing.Cubic.Out).start(); }
        });

        document.getElementById('cat-trigger').addEventListener('click', () => { document.getElementById('secret-letter-overlay').classList.add('show'); });
        document.getElementById('close-letter').addEventListener('click', () => { document.getElementById('secret-letter-overlay').classList.remove('show'); });

        const decos = [ { selector: '.deco-plane', animClass: 'anim-plane' }, { selector: '.deco-popper', animClass: 'anim-popper', hasConfetti: true }, { selector: '.deco-star', animClass: 'anim-star' }, { selector: '.deco-moon', animClass: 'anim-moon' } ];
        decos.forEach(item => { const el = document.querySelector(item.selector); if (!el) return; el.addEventListener('click', () => { if (el.classList.contains(item.animClass)) return; el.classList.add(item.animClass); if (item.hasConfetti) confetti({ particleCount: 20, spread: 50, origin: { x: (el.getBoundingClientRect().left + 22) / window.innerWidth, y: (el.getBoundingClientRect().top + 22) / window.innerHeight }, colors: ['#E0A96D', '#D9727F', '#A890CE'], zIndex: 100 }); el.addEventListener('animationend', () => { el.classList.remove(item.animClass); }, { once: true }); }); });

        const uploadBtn = document.getElementById('uploadBtn'); const uploadInput = document.getElementById('uploadInput'); const texLoader = new THREE.TextureLoader(); let pIdx = 0; let pTotal = 0;
        uploadBtn.addEventListener('click', () => { uploadInput.click(); });
        uploadInput.addEventListener('change', (e) => { const files = e.target.files; if (!files.length) return; let loadedCount = 0; uploadBtn.innerText = "正在放入..."; for (let i = 0; i < files.length; i++) { const url = URL.createObjectURL(files[i]); texLoader.load(url, (tex) => { tex.generateMipmaps = true; tex.minFilter = THREE.LinearMipmapLinearFilter; tex.anisotropy = renderer.capabilities.getMaxAnisotropy(); const m = photos[pIdx % numPhotos]; const ar = tex.image.width / tex.image.height; m.scale.set(100, 100 / ar, 1); m.material.map = tex; m.material.color.setHex(0xffffff); m.material.transparent = false; m.material.opacity = 1.0; m.material.needsUpdate = true; pIdx++; loadedCount++; if (loadedCount === files.length) { pTotal += files.length; uploadBtn.innerText = `继续放入 (${pTotal})`; URL.revokeObjectURL(url); } }); } });

        function fireMainConfetti() { const isMobile = window.innerWidth < 600; const count = isMobile ? 6 : 12; const duration = 4000; const end = Date.now() + duration; (function frame() { const colors = ['#D9727F', '#A890CE', '#FFFFFF', '#E0A96D', '#FFD166']; confetti({ particleCount: count, angle: 60, spread: 80, origin: { x: 0, y: 0.8 }, colors: colors, zIndex: 100 }); confetti({ particleCount: count, angle: 120, spread: 80, origin: { x: 1, y: 0.8 }, colors: colors, zIndex: 100 }); if (Math.random() > 0.5) confetti({ particleCount: count/2, angle: 270, spread: 100, origin: { x: 0.5, y: -0.1 }, colors: colors, zIndex: 100, gravity: 0.8, startVelocity: 15 }); if (Date.now() < end) requestAnimationFrame(frame); }()); }

        // =======================================================
        // 🌟 核心升级：带有语速控制的 Hacker 解密终端 🌟
        // =======================================================
        let clickCount = 0; let clickTimer; let keyBuffer = '';
        let isTermActive = false; let isTyping = false; let termAnimInterval = null;
        const termOverlay = document.getElementById('terminal-overlay');
        const termContent = document.getElementById('terminal-content');

        window.addEventListener('keydown', (e) => { if (e.key === 'Escape') { hideTerminal(); return; } if (e.key.length === 1) { keyBuffer += e.key.toLowerCase(); if (keyBuffer.length > 10) keyBuffer = keyBuffer.slice(-10); if (keyBuffer.endsWith('risu')) { showTerminal(); keyBuffer = ''; } } });
        window.addEventListener('click', (e) => { if (termOverlay.classList.contains('show')) return; clickCount++; clearTimeout(clickTimer); clickTimer = setTimeout(() => { clickCount = 0; }, 1000); if (clickCount >= 16) { showTerminal(); clickCount = 0; } });
        let termClickTimer = 0; termOverlay.addEventListener('click', () => { const now = new Date().getTime(); if (now - termClickTimer < 400) { hideTerminal(); } termClickTimer = now; });

        function showTerminal() {
            if (isTermActive) return;
            isTermActive = true;
            termOverlay.classList.add('show');
            termContent.innerHTML = '';
            runFancyTerminalSequence();
        }

        function hideTerminal() {
            isTermActive = false;
            isTyping = false;
            termOverlay.classList.remove('show');
            termContent.innerHTML = '';
            if (termAnimInterval) clearInterval(termAnimInterval);
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        // 支持控制打字速度和乱码强度的打印函数
        async function printLine(text, options = {}) {
            const { glitch = 2, glitchSpeed = 15, typeDelay = 40 } = options;
            const lineEl = document.createElement('div');
            lineEl.className = 'term-line';
            termContent.appendChild(lineEl);

            const chars = text.split('');
            let currentStr = new Array(chars.length).fill('');
            const symbols = '!<>-_\\\\/[]{}—=+*^?#_';

            for (let i = 0; i < chars.length; i++) {
                if(!isTermActive) return;

                // 乱码特效 (跳过空格)
                if (glitch > 0 && chars[i] !== ' ') {
                    for(let j = 0; j < glitch; j++) {
                        currentStr[i] = symbols[Math.floor(Math.random() * symbols.length)];
                        lineEl.innerText = currentStr.join('') + '█';
                        await sleep(glitchSpeed);
                    }
                }

                // 敲定真实字符
                currentStr[i] = chars[i];
                lineEl.innerText = currentStr.join('') + '█';

                // 停顿延迟 (标点符号额外加点时间，模拟真实打字感)
                let actualDelay = typeDelay;
                if (chars[i] === '.' || chars[i] === '。' || chars[i] === '，' || chars[i] === ',') {
                    actualDelay += 100;
                }

                if (actualDelay > 0) await sleep(actualDelay);
                termContent.scrollTop = termContent.scrollHeight;
            }
            lineEl.innerText = currentStr.join(''); // 移除最后的光标
        }

        function renderAnimatedAscii() {
            const container = document.createElement('div');
            container.className = 'ascii-container';
            termContent.appendChild(container);

            let frame = 0;
            termAnimInterval = setInterval(() => {
                if(!isTermActive) return;
                frame++;

                const f1 = frame % 2 === 0 ? "( )" : " )(";
                const f2 = frame % 2 === 0 ? " )(" : "( )";
                const eye = frame % 20 === 0 ? "-" : "o";
                const star1 = frame % 2 === 0 ? "#FFD166" : "#A890CE";
                const star2 = frame % 2 === 0 ? "#A890CE" : "#FFD166";

                container.innerHTML = `
<div class="ascii-art">
   <span style="color:#FF5722; text-shadow: 0 0 10px #FF5722;"> ${f1} </span>      <span style="color:#FF5722; text-shadow: 0 0 10px #FF5722;"> ${f2} </span>      <span style="color:#FF5722; text-shadow: 0 0 10px #FF5722;"> ${f1} </span>
    <span style="color:#FFF;">|</span>          <span style="color:#FFF;">|</span>          <span style="color:#FFF;">|</span>
 ___<span style="color:#FFF;">|</span>__________<span style="color:#FFF;">|</span>__________<span style="color:#FFF;">|</span>___
<span style="color:#D9727F;">|~~~~~~~~~~~~~~~~~~~~~~~~~~~~~|</span>
|  <span style="color:${star1};">*</span>    <span style="color:${star2};">*</span>    <span style="color:${star1};">*</span>    <span style="color:${star2};">*</span>    <span style="color:${star1};">*</span>    <span style="color:${star2};">*</span> |
|                             |
| <span style="color:#FFF; font-weight:bold;">H A P P Y   B I R T H D A Y</span> |
|          <span style="color:#FFF; font-weight:bold;">R I S U !</span>          |
|                             |
|  <span style="color:${star2};">*</span>    <span style="color:${star1};">*</span>    <span style="color:${star2};">*</span>    <span style="color:${star1};">*</span>    <span style="color:${star2};">*</span>    <span style="color:${star1};">*</span> |
<span style="color:#D9727F;">|~~~~~~~~~~~~~~~~~~~~~~~~~~~~~|</span>
<span style="color:#E0A96D;">~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~</span>
         /\\_______/\\
        /   <span style="color:#2ed573;">${eye}</span>   <span style="color:#2ed573;">${eye}</span>   \\
       (  ==  ^  ==  )
       (             )
       (             )
       (  (  ) (  )  )
       (__(__)_(__)__)  <span style="color:#D9727F;">&lt; 喵~</span>
</div>`;
            }, 100);
        }

        // 串联带有情绪节奏的终端动画
        async function runFancyTerminalSequence() {
            isTyping = true;

            if(!isTermActive) return;
            await printLine("Risu,", { glitch: 2, typeDelay: 80 }); // 郑重，稍慢
            await sleep(800);

            if(!isTermActive) return;
            await printLine("祝你生日快乐", { glitch: 2, typeDelay: 60 });
            await sleep(600);

            if(!isTermActive) return;
            await printLine("这是给你的生日蛋糕", { glitch: 2, typeDelay: 50 });
            await sleep(600);

            if(!isTermActive) return;
            await printLine("当然是吃不了的", { glitch: 2, typeDelay: 40 });
            await sleep(600);

            if(!isTermActive) return;
            await printLine("不过希望你开心", { glitch: 2, typeDelay: 60 });
            await sleep(1000);

            if(!isTermActive) return;
            await printLine("蛋糕加载中......", { glitch: 2, typeDelay: 150 }); // 开始变慢，假装卡顿

            if(!isTermActive) return;
            await sleep(1000);
            await printLine("加载中......", { glitch: 1, typeDelay: 250 }); // 越来越慢

            if(!isTermActive) return;
            await sleep(1200);
            await printLine("......", { glitch: 1, typeDelay: 400 }); // 极其折磨人的慢

            if(!isTermActive) return;
            await sleep(600);
            await printLine("骗你的其实根本不需要加载 =w=", { glitch: 0, typeDelay: 15 }); // 突然超高速打完！

            if(!isTermActive) return;
            await sleep(1000);

            termContent.innerHTML = '';
            renderAnimatedAscii();
            await sleep(900);
            termContent.appendChild(document.createElement('br'));
            termContent.appendChild(document.createElement('br'));
            await printLine("> Happy Birthday, Risu. Love, sw.", { glitch: 1, glitchSpeed: 30, typeDelay: 95 });

            // --- 追加的文案逻辑 ---
            if(!isTermActive) return;
            await sleep(500); // 稍微停顿一下更有打字的感觉
            await printLine("> 真的生日蛋糕会在稍后送来", { glitch: 1, glitchSpeed: 30, typeDelay: 80 });

            isTyping = false;
        }

        // =======================================================
        // 核心渲染循环
        // =======================================================
        transitionToClosed();

        function animate() {
            requestAnimationFrame(animate); TWEEN.update(); const time = Date.now() * 0.001;
            drawVisualizer();

            if (appState === 'INTRO') {
                introControls.update(); const pulseScale = 1 + Math.sin(time * 2) * 0.15; textParticles.material.size = (window.innerWidth < 600 ? 1.5 : 1.8) * pulseScale;
                raycasterIntro.setFromCamera(mouseIntro, introCamera); raycasterIntro.ray.intersectPlane(planeZ0, pointOfIntersection);
                const positions = textParticles.geometry.attributes.position.array; const origins = textParticles.geometry.attributes.originalPosition.array; const vels = textParticles.geometry.attributes.velocity.array;
                for (let i = 0; i < positions.length; i += 3) {
                    let px = positions[i], py = positions[i+1], pz = positions[i+2]; let ox = origins[i], oy = origins[i+1], oz = origins[i+2]; let vx = vels[i], vy = vels[i+1], vz = vels[i+2];
                    if (isAssembling) { let dx = px - pointOfIntersection.x; let dy = py - pointOfIntersection.y; let distSq = dx*dx + dy*dy; if (distSq < 1500) { let force = (1500 - distSq) * 0.0001; vx += dx * force; vy += dy * force; } vx += (ox - px) * 0.004; vy += (oy - py) * 0.004; vz += (oz - pz) * 0.004; } else { vx += (Math.random() - 0.5) * 0.1; vy += (Math.random() - 0.5) * 0.1; vz += (Math.random() - 0.5) * 0.1; }
                    vx *= 0.90; vy *= 0.90; vz *= 0.90; positions[i] += vx; positions[i+1] += vy; positions[i+2] += vz; vels[i] = vx; vels[i+1] = vy; vels[i+2] = vz;
                }
                textParticles.geometry.attributes.position.needsUpdate = true; renderer.render(introScene, introCamera);
            } else if (appState === 'MAIN') {
                const scaleResonance = 1 + (currentBassIntensity * 0.08); galleryGroup.scale.set(scaleResonance, scaleResonance, scaleResonance);
                if (mainState === 'CLOSED') { galleryGroup.rotation.y += 0.002; galleryGroup.rotation.x = 0.1; targetGalleryRotation = galleryGroup.rotation.y; } else if (mainState === 'CAROUSEL' || mainState === 'ZOOMED') { if (!isDragging) targetGalleryRotation -= 0.001; galleryGroup.rotation.x = 0; galleryGroup.rotation.y += (targetGalleryRotation - galleryGroup.rotation.y) * 0.1; if (mainState === 'CAROUSEL') photos.forEach((mesh, i) => { mesh.position.y += Math.sin(time + i) * 0.05; }); }
                renderer.render(mainScene, mainCamera);
            }
        }
        animate();

        window.addEventListener('resize', () => { introCamera.aspect = window.innerWidth / window.innerHeight; introCamera.updateProjectionMatrix(); mainCamera.aspect = window.innerWidth / window.innerHeight; mainCamera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
